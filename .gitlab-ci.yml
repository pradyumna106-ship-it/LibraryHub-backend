stages:
  - test
  - package
  - deploy

default:
  interruptible: true

variables:
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend
  DOCKER_TLS_CERTDIR: "/certs"

backend_test:
  stage: test
  image: node:20-alpine
  rules:
    - if: $CI_COMMIT_BRANCH
  script:
    - npm ci
    - npm test

backend_docker_build_push:
  stage: package
  image: docker:27.1.1
  services:
    - docker:27.1.1-dind
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t "$BACKEND_IMAGE:$CI_COMMIT_SHA" -f Dockerfile .
    - docker tag "$BACKEND_IMAGE:$CI_COMMIT_SHA" "$BACKEND_IMAGE:latest"
    - docker push "$BACKEND_IMAGE:$CI_COMMIT_SHA"
    - docker push "$BACKEND_IMAGE:latest"

backend_deploy_production:
  stage: deploy
  image: alpine:3.20
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$SSH_USER@$SSH_HOST" "
        docker login -u '$CI_REGISTRY_USER' -p '$CI_REGISTRY_PASSWORD' '$CI_REGISTRY' &&
        docker pull '$BACKEND_IMAGE:latest' &&
        docker rm -f library-backend || true &&
        docker run -d --name library-backend \
          --restart unless-stopped \
          --env-file '$BACKEND_DEPLOY_ENV_FILE' \
          -p 4000:4000 \
          '$BACKEND_IMAGE:latest'
      "
