stages:
  - backend_test
  - backend_docker_build_push
  - deploy

variables:
  IMAGE_NAME: pradyumnajkumar/library_hub
  IMAGE_TAG: libraryhub-backend

backend_test:
  stage: backend_test
  image: node:20-alpine
  script:
    - npm ci
    - npm test
    
build_image:
  stage: backend_docker_build_push
  image: docker:29.4.0
  services:
    - docker:29.4.0-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$PASSWORD" | docker login -u "$USER_NAME" --password-stdin
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker push $IMAGE_NAME:$IMAGE_TAG


deploy:
  stage: deploy
  script:
    - echo "Deploy step here (e.g. SSH to server and pull Docker image)"
